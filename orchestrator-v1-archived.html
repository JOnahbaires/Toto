<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toto Orchestrator</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      background: #0c0f1a; color: #e2e8f0;
      min-height: 100vh;
    }
    textarea:focus, button:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(14,165,233,0.15); } 50% { box-shadow: 0 0 40px rgba(14,165,233,0.3); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    /* ——— LOGIN SCREEN ——— */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; animation: fadeIn 0.4s ease-out;
    }
    .login-card {
      background: #111827; border: 1px solid #1e293b; border-radius: 20px;
      padding: 48px 40px; text-align: center; max-width: 380px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
      margin: 0 auto 20px; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    .login-title { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .login-subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    .login-input {
      width: 100%; background: #0c0f1a; border: 1px solid #1e293b;
      border-radius: 10px; padding: 14px 18px; color: #e2e8f0;
      font-size: 16px; font-family: 'DM Sans', sans-serif;
      text-align: center; letter-spacing: 4px;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #6366f1; }
    .login-input::placeholder { letter-spacing: 0; color: #475569; }
    .login-btn {
      width: 100%; margin-top: 16px; padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none; }
    .login-error { color: #fca5a5; font-size: 13px; margin-top: 12px; }

    /* ——— MAIN APP (hidden until auth) ——— */
    #app { display: none; }
    .app-header {
      border-bottom: 1px solid #1e293b; padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, #111827 0%, #0c0f1a 100%);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }
    .header-title { font-size: 18px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.02em; }
    .header-desc { font-size: 12px; color: #64748b; margin-top: 1px; }
    .tab-bar { display: flex; gap: 4px; background: #1e293b; border-radius: 10px; padding: 3px; }
    .tab-btn {
      background: transparent; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; font-weight: 400;
      color: #64748b; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
      font-family: 'DM Sans', sans-serif;
    }
    .tab-btn.active { background: #334155; font-weight: 600; color: #f1f5f9; }
    .content { max-width: 900px; margin: 0 auto; padding: 28px 24px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: slideIn 0.3s ease-out; }

    /* ——— SHARED STYLES ——— */
    .card {
      background: #111827; border: 1px solid #1e293b; border-radius: 16px;
      padding: 24px; margin-bottom: 24px;
    }
    .card.glowing { animation: glow 2s ease-in-out infinite; }
    .label-sm {
      font-size: 13px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
    }
    .input-text, .input-area {
      width: 100%; background: #0c0f1a; border: 1px solid #1e293b;
      border-radius: 10px; padding: 14px 16px; color: #e2e8f0;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      line-height: 1.6; transition: border-color 0.2s;
    }
    .input-area { resize: vertical; }
    .input-text:focus, .input-area:focus { border-color: #6366f1; }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; border-radius: 10px;
      padding: 10px 28px; font-size: 14px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }
    .btn-primary:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none; }
    .btn-secondary {
      background: #1e293b; color: #94a3b8; border: none;
      border-radius: 10px; padding: 10px 20px; font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .fb-pill {
      background: #1e293b; color: #94a3b8; border: 1px solid #1e293b;
      border-radius: 20px; padding: 6px 14px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .fb-pill:hover { background: #273548; border-color: #334155; color: #cbd5e1; }
    .fb-pill.active { background: #6366f120; border-color: #6366f1; color: #a5b4fc; }
    .btn-copy {
      background: #1e293b; border: none; border-radius: 6px;
      padding: 5px 12px; font-size: 12px; color: #94a3b8; cursor: pointer;
    }
    .agent-card {
      background: #111827; border-radius: 14px; margin-bottom: 14px;
      overflow: hidden; animation: slideIn 0.3s ease-out; transition: border-color 0.3s;
    }
    .agent-header {
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .agent-header.clickable { cursor: pointer; }
    .agent-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .agent-body {
      padding: 16px 20px; max-height: 500px; overflow-y: auto; background: #0e1525;
    }
    .spinner {
      width: 14px; height: 14px; border: 2px solid transparent;
      border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite;
    }
    .status-ok { color: #22c55e; font-size: 12px; }
    .status-processing { font-size: 12px; animation: pulse 1.5s ease-in-out infinite; }
    .status-error { color: #ef4444; font-size: 12px; }

    /* Info banners */
    .info-banner {
      border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .info-banner .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .info-banner .body { font-size: 13px; color: #94a3b8; line-height: 1.6; width: 100%; }

    /* Dashboard mini bars */
    .mini-bar-track { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .flex-row { display: flex; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-10 { gap: 10px; }
    .gap-12 { gap: 12px; }
    .mt-14 { margin-top: 14px; }
    .mb-12 { margin-bottom: 12px; }
    .mb-18 { margin-bottom: 18px; }

    /* Tab-specific btn colors */
    .btn-feedback {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      box-shadow: 0 4px 12px rgba(14,165,233,0.3);
    }
    .btn-review {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 4px 12px rgba(245,158,11,0.3);
    }
    .btn-greg {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      box-shadow: 0 4px 12px rgba(124,58,237,0.3);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .app-header { flex-direction: column; gap: 12px; padding: 16px 20px; }
      .grid-2 { grid-template-columns: 1fr; }
      .content { padding: 20px 16px; }
      .dashboard-grid { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">T</div>
    <div class="login-title">Toto Orchestrator</div>
    <div class="login-subtitle">Herramienta interna — ingresá tu PIN</div>
    <input type="password" id="pin-input" class="login-input" placeholder="PIN" maxlength="20"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div id="login-error" class="login-error" style="display:none"></div>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <div class="header-logo">T</div>
      <div>
        <div class="header-title">Toto Orchestrator</div>
        <div class="header-desc" id="header-desc">PM → Dev → QA</div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn" data-tab="dev" onclick="switchTab('dev')">⚡ Dev Pipeline</button>
      <button class="tab-btn active" data-tab="feedback" onclick="switchTab('feedback')">📥 Feedback</button>
      <button class="tab-btn" data-tab="review" onclick="switchTab('review')">🧠 Review</button>
    </div>
  </div>

  <div class="content">
    <!-- ═══════ TAB: DEV PIPELINE ═══════ -->
    <div class="tab-content" id="tab-dev">
      <div class="card" id="dev-card">
        <div class="label-sm">Describí la iniciativa</div>
        <textarea id="dev-initiative" class="input-area" rows="4"
          placeholder="Ej: Fix del encoding en la descarga de sesión..."></textarea>
        <div class="flex-between mt-14">
          <span id="dev-status" style="font-size:12px;color:#475569">Sonnet 4 para los 3 agentes</span>
          <button class="btn-primary" id="dev-run-btn" onclick="runDevPipeline()">Lanzar Pipeline</button>
        </div>
      </div>
      <div id="dev-agents"></div>
      <div id="dev-greg" style="display:none"></div>
      <div id="dev-history"></div>
    </div>

    <!-- ═══════ TAB: FEEDBACK ═══════ -->
    <div class="tab-content active" id="tab-feedback">

      <div class="card" id="fb-card">
        <div class="flex-between mb-18">
          <div class="label-sm" style="margin-bottom:0">Cargar feedback individual</div>
          <span id="fb-count" style="display:none;font-size:12px;color:#22c55e;background:#22c55e15;padding:3px 10px;border-radius:20px;font-weight:500"></span>
        </div>
        <!-- TIPO DE FUENTE -->
        <div class="mb-12">
          <label style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block">Tipo de fuente</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="fb-pill active" id="fb-cat-padre" onclick="setFbCategory('padre')">👨‍👩‍👦 Padre</button>
            <button class="fb-pill" id="fb-cat-nino" onclick="setFbCategory('nino')">🧒 Niño</button>
            <button class="fb-pill" id="fb-cat-especialista" onclick="setFbCategory('especialista')">🎓 Especialista</button>
          </div>
        </div>

        <!-- CAMPOS: PADRE -->
        <div id="fb-fields-padre">
          <div class="grid-2 mb-12">
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Nombre del padre</label>
              <input type="text" id="fb-nombre-padre" class="input-text" placeholder="Requerido" style="border-radius:8px;padding:10px 14px">
            </div>
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Nombre del niño <span style="color:#475569;font-size:11px">(opcional)</span></label>
              <input type="text" id="fb-nombre-nino-p" class="input-text" placeholder="Nombre del niño" style="border-radius:8px;padding:10px 14px">
            </div>
          </div>
          <div class="grid-2 mb-12">
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Edad <span style="color:#475569;font-size:11px">(opcional)</span></label>
              <input type="text" id="fb-edad-p" class="input-text" placeholder="Ej: 11" style="border-radius:8px;padding:10px 14px">
            </div>
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Grado <span style="color:#475569;font-size:11px">(opcional)</span></label>
              <input type="text" id="fb-grado-p" class="input-text" placeholder="Ej: 6to" style="border-radius:8px;padding:10px 14px">
            </div>
          </div>
        </div>

        <!-- CAMPOS: NIÑO -->
        <div id="fb-fields-nino" style="display:none">
          <div class="grid-2 mb-12">
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Nombre del niño</label>
              <input type="text" id="fb-nombre-nino" class="input-text" placeholder="Requerido" style="border-radius:8px;padding:10px 14px">
            </div>
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Edad <span style="color:#475569;font-size:11px">(opcional)</span></label>
              <input type="text" id="fb-edad-n" class="input-text" placeholder="Ej: 11" style="border-radius:8px;padding:10px 14px">
            </div>
          </div>
          <div class="mb-12">
            <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Grado <span style="color:#475569;font-size:11px">(opcional)</span></label>
            <input type="text" id="fb-grado-n" class="input-text" placeholder="Ej: 6to" style="border-radius:8px;padding:10px 14px;max-width:200px">
          </div>
        </div>

        <!-- CAMPOS: ESPECIALISTA -->
        <div id="fb-fields-especialista" style="display:none">
          <div class="grid-2 mb-12">
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Nombre del especialista</label>
              <input type="text" id="fb-nombre-esp" class="input-text" placeholder="Requerido" style="border-radius:8px;padding:10px 14px">
            </div>
            <div>
              <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Especialidad</label>
              <select id="fb-especialidad" class="input-text" onchange="toggleEspOtro()" style="border-radius:8px;padding:10px 14px;cursor:pointer">
                <option value="">Seleccioná...</option>
                <option value="Crianza">Crianza</option>
                <option value="Neurodesarrollo">Neurodesarrollo</option>
                <option value="Pedagogía">Pedagogía</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
          </div>
          <div id="fb-otro-wrapper" class="mb-12" style="display:none">
            <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Especificá la especialidad</label>
            <input type="text" id="fb-especialidad-otro" class="input-text" placeholder="Ej: Psicopedagogía" style="border-radius:8px;padding:10px 14px">
          </div>
        </div>

        <!-- FEEDBACK -->
        <div class="mb-12">
          <label style="font-size:12px;color:#64748b;margin-bottom:4px;display:block">Feedback</label>
          <textarea id="fb-contenido" class="input-area" rows="5" placeholder="Pegá o escribí el feedback acá..." style="border-radius:8px;padding:10px 14px"></textarea>
        </div>

        <!-- FORMATO DE RECEPCIÓN -->
        <div class="mb-18">
          <label style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block">Formato de recepción</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="fb-pill active" id="fb-fmt-whatsapp" onclick="setFbFormat('whatsapp')">💬 WhatsApp</button>
            <button class="fb-pill" id="fb-fmt-email" onclick="setFbFormat('email')">📧 Email</button>
            <button class="fb-pill" id="fb-fmt-cara" onclick="setFbFormat('cara')">🗣️ Cara a cara</button>
            <button class="fb-pill" id="fb-fmt-telefono" onclick="setFbFormat('telefono')">📞 Teléfono</button>
          </div>
        </div>
        <div class="flex-between">
          <span id="fb-status" style="font-size:12px;color:#475569">Intake → Analyst → Metrics</span>
          <div class="flex-row gap-8">
            <button class="btn-secondary" id="fb-reset-btn" style="display:none" onclick="resetFeedback()">+ Nuevo feedback</button>
            <button class="btn-primary btn-feedback" id="fb-run-btn" onclick="runFeedbackPipeline()">Procesar feedback</button>
          </div>
        </div>
      </div>
      <div id="fb-agents"></div>
      <div id="fb-clipboard" style="display:none"></div>
    </div>

    <!-- ═══════ TAB: REVIEW ═══════ -->
    <div class="tab-content" id="tab-review">
      <div class="card" id="review-card">
        <div class="flex-between mb-12">
          <div class="label-sm" style="margin-bottom:0">Pegá filas de feedback (TSV)</div>
          <span id="review-row-count" style="display:none;font-size:12px;color:#f59e0b;background:#f59e0b15;padding:3px 10px;border-radius:20px;font-weight:500"></span>
        </div>
        <textarea id="review-data" class="input-area" rows="6"
          placeholder="Copiá las filas de tu Google Sheet y pegalas acá (Ctrl+V).&#10;Podés incluir la fila de headers — se detecta y se ignora automáticamente."
          style="font-family:'JetBrains Mono',monospace;font-size:13px"
          oninput="updateReviewCount()"></textarea>
        <div class="flex-between mt-14">
          <span id="review-status" style="font-size:12px;color:#475569">Sonnet 4 — dos análisis en paralelo</span>
          <div class="flex-row gap-8">
            <button class="btn-secondary" id="review-reset-btn" style="display:none" onclick="resetReview()">Nuevo análisis</button>
            <button class="btn-primary btn-review" id="review-run-btn" onclick="runReview()">Analizar feedback</button>
          </div>
        </div>
      </div>
      <div id="review-dashboard"></div>
      <div id="review-view-toggle" style="display:none"></div>
      <div id="review-output"></div>
      <div id="review-brief" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════
let AUTH_PIN = null; // guardado en memoria tras login exitoso
let fbProcessedCount = 0;
let devHistory = [];

// ═══════════════════════════════════════════
// CONSTANTES — AGENTES
// ═══════════════════════════════════════════

const AGENTS = {
  pm: {
    name: "PM", emoji: "📋", color: "#2563eb", borderColor: "#bfdbfe",
    system: `Sos el Product Manager de "Toto el Tutor", una app educativa para niños de primaria deployada en toto-rust.vercel.app (v0.1.0).

CONTEXTO DEL PRODUCTO:
- App de tutoría con IA. El niño ingresa nombre, estado emocional y su tarea/duda. Toto guía con pistas sin dar respuestas directas.
- Sistema de estrellas y gamificación. Panel admin de sesiones.
- Stack: Single-file index.html + api/chat.js (proxy serverless) + Vercel. Sin DB todavía (localStorage).
- Usuarios: niños de primaria (10-12 años), padres, docentes, admin.
- AI: claude-haiku-4-5 via Anthropic API (max_tokens: 600, 2 retries)
- Email: EmailJS para reportes de sesión

TU ROL:
Recibís briefs del Orquestador y los convertís en documentos de requerimientos que el Dev puede ejecutar sin ambigüedades.

DADO UN BRIEF, PRODUCÍS:
1. User Stories: "Como [usuario], quiero [acción] para [beneficio]"
2. Criterios de aceptación concretos y verificables por story
3. Prioridad: Must Have / Should Have / Nice to Have
4. Dependencias con otras features o sistemas
5. Riesgos identificados
6. Alcance: qué SÍ y qué NO incluye

REGLAS:
- Si el brief tiene ambigüedades, señalalas pero intentá resolverlas con tu mejor criterio.
- Cada user story debe completarse en máximo 1 semana de desarrollo.
- Si una story es muy grande, partila en stories más chicas.
- El output debe pasarse directamente al Dev sin más aclaraciones.
- Español rioplatense, claro y sin jerga innecesaria.`
  },
  dev: {
    name: "Dev", emoji: "💻", color: "#059669", borderColor: "#a7f3d0",
    system: `Sos el Desarrollador Senior de "Toto el Tutor", una app educativa deployada en Vercel (toto-rust.vercel.app, v0.1.0).

async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;

  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'Verificando...';
  errEl.style.display = 'none';

  try {
    // Verificar PIN haciendo una llamada mínima al proxy
    const res = await fetch('/api/orchestrator', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pin: pin,
        system: 'Respondé solo "ok".',
        messages: [{ role: 'user', content: 'ping' }],
        model: 'claude-sonnet-4-20250514'
      })
    });

    if (res.status === 401) {
      errEl.textContent = 'PIN incorrecto. Intentá de nuevo.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar';
      return;
    }

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || `Error ${res.status}`);
    }

    // Login exitoso
    AUTH_PIN = pin;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('headers-area').value = SHEET_COLUMNS.join('\t');

  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Entrar';
}

async function callAgent(agentOrSystem, prompt) {
  const system = typeof agentOrSystem === 'string' ? agentOrSystem : agentOrSystem.system;

  const res = await fetch('/api/orchestrator', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      pin: AUTH_PIN,
      system: system,
      messages: [{ role: 'user', content: prompt }],
      model: 'claude-sonnet-4-20250514'
    })
  });

  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `Error ${res.status}`);
  }

  const data = await res.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
}

// MARKDOWN RENDERER (simplified for vanilla JS)
// ═══════════════════════════════════════════

function renderMarkdown(text) {
  if (!text) return '';
  let html = '';
  const lines = text.split('\n');
  let inCode = false, codeLines = [];
  let inTable = false, tableLines = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('```')) {
      if (!inCode) { inCode = true; codeLines = []; }
      else {
        html += `<pre style="background:#1e1e2e;color:#cdd6f4;padding:14px 18px;border-radius:8px;font-size:13px;overflow-x:auto;margin:10px 0;font-family:'JetBrains Mono',monospace;line-height:1.6"><code>${escHtml(codeLines.join('\n'))}</code></pre>`;
        inCode = false; codeLines = [];
      }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    // Table
    if (line.startsWith('|') && line.endsWith('|')) {
      tableLines.push(line);
      if (i + 1 >= lines.length || !lines[i + 1]?.startsWith('|')) {
        html += renderTable(tableLines);
        tableLines = [];
      }
      continue;
    }

    if (line.startsWith('### ')) html += `<h4 style="margin:18px 0 8px;font-size:14px;font-weight:700;color:#f1f5f9">${inlineFormat(line.slice(4))}</h4>`;
    else if (line.startsWith('## ')) html += `<h3 style="margin:20px 0 10px;font-size:16px;font-weight:700;color:#f8fafc">${inlineFormat(line.slice(3))}</h3>`;
    else if (line.startsWith('# ')) html += `<h2 style="margin:22px 0 12px;font-size:18px;font-weight:800;color:#f8fafc">${inlineFormat(line.slice(2))}</h2>`;
    else if (line.startsWith('- ') || line.startsWith('* '))
      html += `<div style="display:flex;gap:8px;margin:3px 0;padding-left:4px"><span style="color:#94a3b8;flex-shrink:0">•</span><span style="color:#cbd5e1;font-size:14px;line-height:1.6">${inlineFormat(line.slice(2))}</span></div>`;
    else if (/^\d+\.\s/.test(line)) {
      const num = line.match(/^(\d+)\./)[1];
      html += `<div style="display:flex;gap:8px;margin:3px 0;padding-left:4px"><span style="color:#64748b;font-weight:600;flex-shrink:0;font-size:13px">${num}.</span><span style="color:#cbd5e1;font-size:14px;line-height:1.6">${inlineFormat(line.replace(/^\d+\.\s/, ''))}</span></div>`;
    }
    else if (line.trim() === '') html += '<div style="height:8px"></div>';
    else html += `<p style="margin:4px 0;color:#cbd5e1;font-size:14px;line-height:1.7">${inlineFormat(line)}</p>`;
  }
  return html;
}

function inlineFormat(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong style="font-weight:700;color:#f1f5f9">$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:0.9em;color:#7c3aed;font-family:\'JetBrains Mono\',monospace">$1</code>');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTable(rows) {
  if (rows.length < 3) return '';
  const header = rows[0].split('|').filter(c => c.trim());
  const data = rows.slice(2);
  let h = '<div style="overflow-x:auto;margin:10px 0"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>';
  header.forEach(c => h += `<th style="padding:8px 12px;border-bottom:2px solid #e2e8f0;text-align:left;font-weight:600;color:#334155;background:#f8fafc;white-space:nowrap">${escHtml(c.trim())}</th>`);
  h += '</tr></thead><tbody>';
  data.forEach((row, ri) => {
    h += `<tr style="background:${ri % 2 ? '#f8fafc' : 'white'}">`;
    row.split('|').filter(c => c.trim()).forEach(cell =>
      h += `<td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;color:#475569;font-size:13px">${escHtml(cell.trim())}</td>`
    );
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

// PARSER
// ═══════════════════════════════════════════

function parseAgentOutput(text, fields) {
  const result = {};
  for (let i = 0; i < fields.length; i++) {
    const field = fields[i];
    const nextFields = fields.slice(i + 1);
    let pattern;
    if (nextFields.length > 0) {
      const nextPat = nextFields.map(f => f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
      pattern = new RegExp(field + ':\\s*([\\s\\S]*?)(?=(?:' + nextPat + '):|$)', 'i');
    } else {
      pattern = new RegExp(field + ':\\s*([\\s\\S]*)$', 'i');
    }
    const match = text.match(pattern);
    result[field] = match ? match[1].replace(/\n/g, ' ').replace(/\s+/g, ' ').trim() : '—';
  }
  return result;
}

function renderAgentCard(containerId, agentId, agent, output, error, isActive, isExpanded) {
  const container = document.getElementById(containerId);
  let card = document.getElementById('card-' + agentId);

  if (!output && !isActive && !error) {
    if (card) card.remove();
    return;
  }

  const html = `
    <div class="agent-card" id="card-${agentId}" style="border:1px solid ${borderColor}">
      <div class="agent-header ${isDone ? 'clickable' : ''}" onclick="${isDone ? `toggleAgent('${agentId}')` : ''}">
        <div class="flex-row gap-12">
          <div class="agent-icon" style="background:${agent.color}20">${agent.emoji}</div>
          <div>
            <span style="font-weight:600;font-size:14px;color:#f1f5f9">${agent.name}</span>
            ${isActive ? `<span style="margin-left:10px" class="status-processing" style="color:${agent.color}">Procesando...</span>` : ''}
            ${isDone ? '<span style="margin-left:10px" class="status-ok">✓ Listo</span>' : ''}
            ${error ? '<span style="margin-left:10px" class="status-error">✗ Error</span>' : ''}
          </div>
        </div>
        <div class="flex-row gap-8">
          ${isDone ? `<button class="btn-copy" onclick="event.stopPropagation();copyText(agentOutputs['${agentId}'], this)">Copiar</button>` : ''}
          ${isDone ? `<span style="color:#475569;font-size:18px;transform:${isExpanded ? 'rotate(180deg)' : 'rotate(0)'};transition:transform 0.2s;display:inline-block">▾</span>` : ''}
        </div>
      </div>
      ${isExpanded && isDone ? `<div class="agent-body" style="border-top:1px solid #1e293b">${renderMarkdown(output)}</div>` : ''}
      ${error ? `<div style="padding:12px 20px;color:#fca5a5;font-size:13px;background:#1c111180">${escHtml(error)}</div>` : ''}
    </div>`;

  if (card) {
    card.outerHTML = html;
  } else {
    container.insertAdjacentHTML('beforeend', html);
  }
}

// Agent outputs almacenados para copy
let agentOutputs = {};

function toggleAgent(agentId) {
  const card = document.getElementById('card-' + agentId);
  if (!card) return;
  const body = card.querySelector('.agent-body');
  const arrow = card.querySelector('span[style*="transform"]');
  if (body) {
    body.remove();
    if (arrow) arrow.style.transform = 'rotate(0)';
  } else {
    const header = card.querySelector('.agent-header');
    header.insertAdjacentHTML('afterend', `<div class="agent-body" style="border-top:1px solid #1e293b">${renderMarkdown(agentOutputs[agentId] || '')}</div>`);
    if (arrow) arrow.style.transform = 'rotate(180deg)';
  }
}

function copyText(text, btnEl) {
  if (!text) return;

  // Intento 1: Clipboard API moderna
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showCopyFeedback(btnEl, true);
    }).catch(() => {
      // Intento 2: fallback con textarea
      doFallbackCopy(text, btnEl);
    });
  } else {
    doFallbackCopy(text, btnEl);
  }
}

function doFallbackCopy(text, btnEl) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      showCopyFeedback(btnEl, true);
    } else {
      showCopyModal(text);
    }
  } catch (e) {
    showCopyModal(text);
  }
}

function showCopyFeedback(btnEl, success) {
  if (!btnEl) return;
  const original = btnEl.textContent;
  btnEl.textContent = success ? '✓ Copiado' : '✗ Error';
  btnEl.style.color = success ? '#22c55e' : '#ef4444';
  setTimeout(() => { btnEl.textContent = original; btnEl.style.color = ''; }, 1500);
}

function showCopyModal(text) {
  // Último recurso: mostrar un modal con el texto para copiar manualmente
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#111827;border:1px solid #1e293b;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:12px">
      <div style="font-size:14px;color:#f1f5f9;font-weight:600">Seleccioná todo y copiá manualmente (Ctrl+A → Ctrl+C)</div>
      <textarea readonly style="width:100%;height:300px;background:#0c0f1a;border:1px solid #22c55e40;border-radius:8px;padding:12px;color:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',monospace;resize:none">${text.replace(/</g,'&lt;')}</textarea>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="background:#1e293b;color:#94a3b8;border:none;border-radius:8px;padding:10px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif">Cerrar</button>
    </div>`;
  document.body.appendChild(overlay);
  const ta = overlay.querySelector('textarea');
  ta.focus(); ta.select();
}

    statusEl.innerHTML = `<span class="flex-row gap-8"><span class="spinner" style="border-top-color:${FEEDBACK_AGENTS.metrics.color}"></span>${FEEDBACK_AGENTS.metrics.emoji} Metrics procesando...</span>`;
    renderAgentCard('fb-agents', 'metrics', FEEDBACK_AGENTS.metrics, null, null, true, true);

async function saveFeedback() {
  const btn = document.getElementById('fb-save-btn');
  const statusEl = document.getElementById('fb-save-status');
  if (!btn || !window._lastFeedbackData) return;

  btn.disabled = true;
  btn.textContent = 'Guardando...';
  statusEl.textContent = '';

  try {
    const res = await fetch('/api/save-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: AUTH_PIN, ...window._lastFeedbackData })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

    btn.textContent = '✓ Guardado';
    btn.style.background = 'linear-gradient(135deg,#15803d,#16a34a)';
    btn.style.boxShadow = '0 4px 12px rgba(22,163,74,0.3)';
    btn.disabled = true;

    const shortFile = data.file ? data.file.split('/').pop() : '';
    statusEl.innerHTML = `<span style="color:#22c55e">${shortFile}${data.index_updated ? ' · INDEX actualizado' : ''}</span>`;

  } catch (err) {
    btn.disabled = false;
    btn.textContent = '💾 Guardar en repo';
    statusEl.innerHTML = `<span style="color:#ef4444">Error: ${escHtml(err.message)}</span>`;
  }
}

async function runReview() {

  if (dataLines.length === 0) return;

  const HEADERS = SHEET_COLUMNS;
  const rows = dataLines.map(line => {
    const cells = line.split('\t');
    const row = {};
    HEADERS.forEach((h, i) => { row[h] = cells[i]?.trim() || '—'; });
    return row;
  });

  const btn = document.getElementById('review-run-btn');
  const statusEl = document.getElementById('review-status');

  // Build feedback summary

Fecha: ${r.Fecha} | Alumno: ${r.Alumno} | Fuente: ${r['Padre/Fuente']}
Feedback crudo: ${r['Feedback crudo']}
Resumen: ${r.Resumen}
Emoción: ${r['Emoción']} | Tema: ${r.Tema} | Subtemas: ${r.Subtemas}
Categoría: ${r['Categoría']} | Prioridad: ${r.Prioridad} | Accionable: ${r.Accionable}
Acción sugerida: ${r['Acción sugerida']}
Fase roadmap: ${r['Fase roadmap']} | Feature relacionada: ${r['Feature relacionada']}
Impacto métrica paramount: ${r['Impacto métrica paramount']}
Señal de alerta: ${r['Señal de alerta']}
Hipótesis: ${r['Hipótesis']}`).join('\n\n');

  try {
    const [strategic, exec] = await Promise.all([
      callAgent(STRATEGIST_SYSTEM, `Analizá el siguiente conjunto de ${rows.length} feedback(s) procesado(s) de Toto el Tutor y producí tu análisis estratégico completo.\n\nFEEDBACKS:\n${summary}`),
      callAgent(STRATEGIST_SYSTEM, `Analizá este conjunto de ${rows.length} feedback(s) de Toto el Tutor y escribí un resumen ejecutivo para Jonah, el founder (no técnico).

El resumen debe:
1. Empezar con "Lo que te están diciendo los usuarios:" — 2-3 oraciones
2. "Lo que está funcionando:" — máximo 3 puntos concretos
3. "Lo que hay que mejorar:" — máximo 3 puntos, ordenados por urgencia
4. "Mi recomendación:" — UNA acción concreta para esta semana

NO uses jerga técnica. Escribí como un WhatsApp largo pero bien estructurado. Español rioplatense.

FEEDBACKS:\n${summary}`)
    ]);

    agentOutputs.strategic = strategic;
    agentOutputs.exec = exec;

    // View toggle
    toggleEl.style.display = 'block';
    toggleEl.innerHTML = `
      <div style="display:flex;gap:4px;background:#1e293b;border-radius:10px;padding:3px;margin-bottom:16px;width:fit-content">
        <button class="tab-btn active" id="view-exec" onclick="switchReviewView('exec')" style="font-family:'DM Sans',sans-serif">📝 Para vos</button>

function renderDashboard(container, rows) {
  const total = rows.length;
  if (!total) return;

  const emo = { positiva: 0, negativa: 0, mixta: 0, neutra: 0 };
  rows.forEach(r => {
    const e = (r['Emoción'] || '').toLowerCase();
    if (e.includes('positiv')) emo.positiva++;
    else if (e.includes('negativ')) emo.negativa++;
    else if (e.includes('mixt')) emo.mixta++;
    else emo.neutra++;
  });

  const temas = {};
  rows.forEach(r => { const t = (r.Tema || 'otro').trim(); temas[t] = (temas[t] || 0) + 1; });
  const topTemas = Object.entries(temas).sort((a, b) => b[1] - a[1]).slice(0, 5);

  const prio = { crítica: 0, alta: 0, media: 0, baja: 0 };
  rows.forEach(r => {
    const p = (r.Prioridad || '').toLowerCase();
    if (p.includes('crít')) prio.crítica++;
    else if (p.includes('alta')) prio.alta++;
    else if (p.includes('media')) prio.media++;
    else if (p.includes('baja')) prio.baja++;
  });

  const imp = { positivo: 0, negativo: 0, neutro: 0, nd: 0 };
  rows.forEach(r => {
    const i = (r['Impacto métrica paramount'] || '').toLowerCase();
    if (i.includes('positiv')) imp.positivo++;
    else if (i.includes('negativ')) imp.negativo++;
    else if (i.includes('neutr')) imp.neutro++;
    else imp.nd++;
  });

  function bar(label, val, tot, color, emoji) {
    const pct = tot > 0 ? Math.round((val / tot) * 100) : 0;
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;color:#cbd5e1">${emoji} ${escHtml(label)}</span><span style="font-size:12px;color:#64748b;font-weight:600">${val} <span style="color:#475569">(${pct}%)</span></span></div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  }

  const card = s => `<div style="background:#111827;border:1px solid #1e293b;border-radius:14px;padding:18px 20px;flex:1 1 200px;min-width:0">${s}</div>`;
  const title = t => `<p style="font-size:12px;color:#64748b;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em">${t}</p>`;

  const temaColors = ["#6366f1","#0ea5e9","#8b5cf6","#ec4899","#14b8a6"];
  const temaEmojis = ["🥇","🥈","🥉","4️⃣","5️⃣"];

  container.innerHTML = `
    <div style="margin-bottom:24px;animation:slideIn 0.4s ease-out">
      <div class="flex-row gap-8" style="margin-bottom:14px">
        <span style="font-size:16px">📊</span>
        <h3 style="font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em">Dashboard — ${total} feedback${total > 1 ? 's' : ''}</h3>
      </div>
      <div class="dashboard-grid" style="display:flex;flex-wrap:wrap;gap:12px">
        ${card(title('Emoción') + bar('Positiva', emo.positiva, total, '#22c55e', '😊') + bar('Mixta', emo.mixta, total, '#f59e0b', '😐') + bar('Negativa', emo.negativa, total, '#ef4444', '😟') + bar('Neutra', emo.neutra, total, '#64748b', '😶'))}
        ${card(title('Temas frecuentes') + topTemas.map(([t, c], i) => bar(t, c, total, temaColors[i], temaEmojis[i])).join(''))}
        ${card(title('Prioridad') + bar('Crítica', prio.crítica, total, '#ef4444', '🔴') + bar('Alta', prio.alta, total, '#f97316', '🟠') + bar('Media', prio.media, total, '#f59e0b', '🟡') + bar('Baja', prio.baja, total, '#22c55e', '🟢'))}
        ${card(title('Impacto en retención') + bar('Positivo', imp.positivo, total, '#22c55e', '⬆️') + bar('Negativo', imp.negativo, total, '#ef4444', '⬇️') + bar('Neutro', imp.neutro, total, '#64748b', '➡️') + bar('Sin dato', imp.nd, total, '#334155', '❓'))}
      </div>
    </div>`;
}

function resetReview() {
  document.getElementById('review-data').value = '';
  document.getElementById('review-output').innerHTML = '';
  document.getElementById('review-dashboard').innerHTML = '';
  document.getElementById('review-view-toggle').style.display = 'none';
  document.getElementById('review-brief').style.display = 'none';
  document.getElementById('review-reset-btn').style.display = 'none';
  document.getElementById('review-row-count').style.display = 'none';
  document.getElementById('review-status').innerHTML = '<span style="color:#475569">Sonnet 4 — dos análisis en paralelo</span>';
}

// Focus en el input de PIN al cargar
window.addEventListener('load', () => document.getElementById('pin-input')?.focus());
</script>
</body>
</html>
